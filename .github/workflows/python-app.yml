# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# AGREGA ESTE BLOQUE AQUÍ (Línea 14 aproximadamente)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Aprovecha para corregir lo anterior
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Asegúrate de que sea v5
        with:
          python-version: "3.10"
      # ... resto de tus pasos (instalar dependencias, etc.)